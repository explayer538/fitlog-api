services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fitlog_db
      POSTGRES_USER: fitlog_user
      POSTGRES_PASSWORD: fitlog123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
